<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>MedTechONE Knowledge Wheel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    background: transparent;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }
  .wheel-wrap {
    width: min(96vw, 96vh);
    aspect-ratio: 1;
    max-width: 800px;
    margin: 20px auto 0 auto;
    display: block;
  }
  svg { width: 100%; height: 100%; overflow: visible; }
  .slice { cursor: pointer; transition: opacity 0.18s; }
  .slice:hover { opacity: 0.82; }
  .icon-img { mix-blend-mode: screen; pointer-events: none; }
  .ext-label {
    font-size: 12px;
    font-weight: 400;
    fill: #333;
    dominant-baseline: middle;
    cursor: pointer;
  }
  .ext-label:hover { fill: #555; }
  .tick { stroke: #bbb; stroke-width: 1.2; }
  .theme-label { font-size: 16px; font-weight: 700; fill: white; pointer-events: none; }
  .centre-word {
    font-size: 14px; font-weight: 700; fill: #444;
    text-anchor: middle; dominant-baseline: middle;
    pointer-events: none; letter-spacing: 0.8px;
  }
</style>
</head>
